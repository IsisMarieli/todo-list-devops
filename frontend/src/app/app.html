<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <i class="pi pi-server" style="color:#7dd3fc;font-size:15px" aria-hidden="true"></i>
      <span class="topbar-brand">To-Do List</span>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-label">Tarefas</div>
      
      <div class="nav-item nav-item-todas active" style="cursor: default;">
        <i class="pi pi-list" aria-hidden="true"></i> todas as tarefas
        <span class="nav-count accent">{{ totalCount }}</span>
      </div>
    </div>

    <div class="content">
      <div class="content-header">
        <div>
          <div class="content-title">Status</div>
          <div class="content-sub">{{ totalCount }} tarefas · <span>{{ doneCount }} concluídas</span></div>
        </div>
        <button class="add-btn" (click)="toggleForm()"><i class="pi pi-plus"></i> nova tarefa</button>
      </div>

      <div class="task-list">
        <div class="inline-form" [ngClass]="{'visible': formVisible}">
          <input class="form-input" [(ngModel)]="newTask" placeholder="descrição da tarefa..." (keyup.enter)="addTodo()" />
          <div class="form-row">
            <div class="form-actions">
              <button class="btn-cancel" (click)="toggleForm()"><i class="pi pi-times"></i> cancelar</button>
              <button class="btn-save" (click)="addTodo()"><i class="pi pi-save"></i> salvar</button>
            </div>
          </div>
        </div>

        <div *ngFor="let todo of filteredTodos" 
            class="task-card" 
            [ngClass]="{'done': todo.completed > 0, 'editing': editingId === todo.id}">
          
          <div class="task-check" [ngClass]="{'checked': todo.completed === 1}" (click)="toggleTask(todo)">
            <i *ngIf="todo.completed === 1" class="pi pi-check" aria-hidden="true"></i>
          </div>

          <ng-container *ngIf="editingId === todo.id; else readMode">
            <div class="edit-area">
              <input class="edit-input" [(ngModel)]="editTitle" (keyup.enter)="saveEdit(todo)" />
              <div class="edit-row">
                <div class="edit-actions">
                  <button class="btn-edit-cancel" (click)="cancelEdit()"><i class="pi pi-times"></i> cancelar</button>
                  <button class="btn-edit-save" (click)="saveEdit(todo)"><i class="pi pi-save"></i> salvar</button>
                </div>
              </div>
            </div>
          </ng-container>

          <ng-template #readMode>
              <div class="task-title">{{ todo.task }}</div>
            <div class="task-actions">
              <button class="act-btn edit-btn" (click)="startEdit(todo)" aria-label="editar tarefa"><i class="pi pi-pencil" aria-hidden="true"></i></button>
              <button class="act-btn del-btn" (click)="deleteTask(todo.id)" aria-label="excluir tarefa"><i class="pi pi-trash" aria-hidden="true"></i></button>
            </div>
          </ng-template>

        </div>

        <p *ngIf="filteredTodos.length === 0" style="font-size:12px; color:#FFFFFF; text-align:center; padding: 20px;">
          Nenhuma tarefa encontrada!
        </p>

      </div>
    </div>
  </div>
</div>
