<div class="container">
  <h1>Todo List</h1>

  <div class="input-area">
    <input
      [(ngModel)]="newTask"
      placeholder="Nova tarefa..."
      (keyup.enter)="addTodo()"
    />
    <button (click)="addTodo()">Adicionar</button>
  </div>

  <ul>
    <li *ngFor="let todo of todos">
      {{ todo.task }}
    </li>
  </ul>

  <p *ngIf="todos.length === 0">Nenhuma tarefa ainda!</p>
</div>
